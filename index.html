<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Time Remastered 3D FPS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<
  <div id="hud">
  <span id="hudTime">Time: 0</span>
  <span id="hudRen">Ren: 0</span>
</div>
>

  <canvas id="gameCanvas"></canvas>

  <!-- UI -->
  <div id="ui">
    <h1>Time Remastered</h1>

    <div class="panel">
      <h3>Stats</h3>
      <div>Time: <span id="time">0</span></div>
      <div>Ren: <span id="ren">0</span></div>
      <div>Time/sec: <span id="tps">0</span></div>
      <div>Playtime: <span id="playtime">0</span> s</div>
    </div>

    <div class="panel">
      <h3>Your Save</h3>
      <input id="playerNameInput" placeholder="Save name" />
      <button id="saveNameBtn">Set Name</button>
      <div class="hint">Name must be unique.</div>

      <div class="panel-line"></div>

      <div>Save ID:</div>
      <input id="saveIdDisplay" readonly />
    </div>

    <div class="panel">
      <h3>Save / Load</h3>
      <button id="saveBtn">Save</button>
      <button id="loadBtn">Load</button>

      <div class="panel-line"></div>

      <button id="exportBtn">Export</button>
      <button id="importBtn">Import</button>
      <textarea id="saveText"></textarea>
    </div>
  </div>

  <!-- Name Wall -->
  <div id="nameWall">
    <h2>Name Wall</h2>
    <div id="nameWallList">Loading…</div>
  </div>

  <!-- Interact Prompt -->
  <div id="interactPrompt" class="hidden">Press E</div>

  <!-- Context Menu -->
  <div id="contextMenu" class="menu hidden">
    <div class="menu-inner">
      <div class="menu-header">
        <span id="contextTitle">Menu</span>
        <button id="closeContextBtn">X</button>
      </div>
      <div class="menu-content">
        <div class="menu-page" data-page="quests">
          <h3>Quests</h3>
          <p>Coming soon.</p>
        </div>

        <div class="menu-page hidden" data-page="codes">
          <h3>Codes</h3>
          <input id="codeInput" placeholder="Enter code" />
          <button id="redeemCodeBtn">Redeem</button>
          <div id="codeMessage" class="hint"></div>
        </div>

        <div class="menu-page hidden" data-page="settings">
          <h3>Settings</h3>
          <p>Coming soon.</p>
        </div>

        <div class="menu-page hidden" data-page="achievements">
          <h3>Achievements</h3>
          <p>Coming soon.</p>
        </div>

        <div class="menu-page hidden" data-page="enchant">
          <h3>Enchant</h3>
          <p>Cost: <span id="enchantCost">100</span> Ren</p>
          <button id="enchantBtn">Enchant</button>
          <div id="enchantMessage" class="hint"></div>
        </div>

        <div class="menu-page hidden" data-page="name">
          <h3>Change Name</h3>
          <input id="menuNameInput" placeholder="Save name" />
          <button id="menuNameBtn">Set Name</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Three.js -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <!-- Back4App -->
  <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
  <script>
    Parse.initialize(
      "ogmS1bciV4vu7ela41MyzbNUKPUCWv72WDv7iMn9",
      "5GdY7Bdj7OQHEBVYqJic0tnofKCMqITehVKhiapM"
    );
    Parse.serverURL = "https://parseapi.back4app.com";
  </script>

  <script src="game.js"></script>
</body>
</html>
